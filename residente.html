<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Portal Residente · Neo-Pediátrica</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--pri:#2c5282;--pri-bg:#ebf8ff;--neo:#276749;--neo-bg:#f0fff4;--txt:#2d3748;--muted:#718096;--brd:#e2e8f0;--bg:#f7fafc;--wht:#fff;--red:#e53e3e}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,var(--pri),var(--neo));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr h1{font-size:.95rem;font-weight:800}
.hdr .sub{font-size:.72rem;opacity:.8;margin-top:2px}
.hdr .status{font-size:.68rem;opacity:.65;margin-top:1px}
.content{padding:12px;max-width:500px;margin:0 auto}
.card{background:var(--wht);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.card-title{font-size:.82rem;font-weight:700;color:var(--pri);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--wht);border-top:1px solid var(--brd);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nb{flex:1;border:none;background:none;cursor:pointer;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;color:var(--muted);transition:color .15s;font-family:inherit}
.nb .ic{font-size:1.4rem;line-height:1}
.nb.act{color:var(--pri)}
/* Stat row */
.sr{display:flex;gap:8px;margin-bottom:14px}
.sb{flex:1;background:var(--pri-bg);border-radius:10px;padding:10px 8px;text-align:center;border-left:3px solid var(--pri)}
.sb .n{font-size:1.5rem;font-weight:800;color:var(--pri);line-height:1}
.sb .l{font-size:.62rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
/* Forms */
.fg{margin-bottom:12px}
label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
input,select,textarea{width:100%;border:1.5px solid var(--brd);border-radius:8px;padding:10px;font-size:.9rem;background:var(--wht);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri)}
textarea{min-height:60px;resize:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.bp{background:var(--pri);color:#fff;width:100%}
.bg2{background:var(--bg);color:var(--txt);border:1.5px solid var(--brd)}
.br{background:var(--red);color:#fff}
/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.8rem;font-weight:600}
.cal-nav .mn{font-weight:700;font-size:.88rem;text-transform:capitalize}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-hdr div{text-align:center;font-size:.6rem;font-weight:700;color:var(--muted);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;border:1.5px solid var(--brd);background:var(--bg);font-size:.82rem;font-weight:500;transition:all .1s;-webkit-tap-highlight-color:transparent;user-select:none}
.cd:active{opacity:.7;transform:scale(.95)}
.cd.g{background:var(--pri-bg);border-color:var(--pri);color:var(--pri);font-weight:700}
.cd.gf{background:#fefcbf;border-color:#d69e2e;color:#744210;font-weight:700}
.cd.today{border-width:2.5px;border-color:var(--pri)}
.cd .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.8}
/* Proc list */
.pi{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--brd);gap:10px;font-size:.83rem}
.pi:last-child{border-bottom:none}
.pcnt{margin-left:auto;min-width:28px;text-align:center;background:var(--pri);color:#fff;border-radius:20px;padding:3px 8px;font-size:.72rem;font-weight:800;cursor:pointer;flex-shrink:0}
.pcnt.z{background:var(--bg);color:var(--muted);border:1.5px solid var(--brd)}
/* Recent items */
.ri{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd);gap:10px;font-size:.82rem}
.ri:last-child{border-bottom:none}
.ri .meta{font-size:.7rem;color:var(--muted);margin-top:2px}
/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#276749;color:#fff;padding:10px 20px;border-radius:20px;font-size:.82rem;font-weight:700;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
/* Modal */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:50;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.mc{background:var(--wht);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-size:.95rem;font-weight:700}
.mx{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
.mf{margin-top:14px}
/* hoy badge */
.hoy-section{background:var(--neo-bg);border-radius:10px;padding:12px;margin-bottom:12px;border-left:3px solid var(--neo)}
.hoy-title{font-size:.7rem;font-weight:700;color:var(--neo);text-transform:uppercase;margin-bottom:8px}
.empty-msg{text-align:center;color:var(--muted);padding:20px;font-size:.85rem}
</style>
</head>
<body>

<div class="hdr">
  <h1 id="hdrName">Cargando…</h1>
  <div class="sub" id="hdrSub">Residencia Neo-Pediátrica · Sanatorio 9 de Julio</div>
  <div class="status" id="hdrStatus"></div>
</div>

<div class="content" id="content">
  <div class="card" style="text-align:center;padding:30px">
    <div style="font-size:2rem;margin-bottom:8px">⏳</div>
    <p>Iniciando…</p>
  </div>
</div>

<div class="bnav" id="bnav" style="display:none">
  <button class="nb act" id="tab-guardias" onclick="setTab('guardias')"><span class="ic">🌙</span>Guardias</button>
  <button class="nb" id="tab-procs" onclick="setTab('procs')"><span class="ic">🏥</span>Procedimientos</button>
  <button class="nb" id="tab-ateneos" onclick="setTab('ateneos')"><span class="ic">📖</span>Ateneos</button>
  <button class="nb" id="tab-casos" onclick="setTab('casos')"><span class="ic">📋</span>Casos</button>
</div>

<div class="mo" id="mo"><div class="mc" id="mc"></div></div>
<div class="toast" id="toast"></div>

<script>
// ===== CONSTANTES =====
const PNEO=['Intubación endotraqueal','Extubación programada','CUV (Catéter umbilical venoso)','CAU (Catéter umbilical arterial)','Catéter percutáneo (PICC)','Acceso venoso periférico neonatal','Punción lumbar neonatal','Toracocentesis / Drenaje pleural','Paracentesis neonatal','CPAP nasal','VAFO','ARM/VMA neonatal','RCP neonatal avanzada','Exanguinotransfusión','Surfactante exógeno','Fototerapia','Sondaje orogástrico / nasogástrico','Ecografía transfontanelar','Hipotermia terapéutica','Interpretación de gases y lab.'];
const PPED=['Punción lumbar pediátrica','Acceso venoso periférico','Acceso intraóseo (IO)','Catéter venoso central','Intubación secuencia rápida (ISR)','Extubación programada pediátrica','ARM/VMA pediátrica','CPAP / BiPAP','RCP pediátrica avanzada','Cardioversión / desfibrilación','Toracocentesis pediátrica','Paracentesis pediátrica','Artrocentesis','Reducción de luxaciones','Sutura de heridas','Cateterismo vesical','Sondaje nasogástrico','Nebulización / aerosolterapia','Monitoreo hemodinámico invasivo','Lectura Rx tórax y abdomen'];
const SECTORES=['Guardia pediátrica','Neonatología','UCIP','Internación pediátrica','Consultorio externo','Consultorio alto riesgo','Adolescencia'];
const TIPOS_AT={clinico:'🏥 Ateneo clínico',bibliografico:'📚 Bibliográfico',morbimortalidad:'⚠️ Morbi-mortalidad',simulacion:'🎯 Simulación',clase:'📝 Clase / Taller'};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const hoy=()=>new Date().toISOString().split('T')[0];
const fd=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`};

// ===== ESTADO =====
let db=null,rid=null,residente=null,tab='guardias';
let S={guardias:[],procs:[],ateneos:[],casos:[]};
let _gcal={y:new Date().getFullYear(),m:new Date().getMonth()};
let saving=false;

// ===== INIT =====
const params=new URLSearchParams(window.location.search);
rid=params.get('rid');

function toast(msg,color='#276749'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function initFirebase(cfg){
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    db=firebase.firestore();
    return true;
  }catch(e){console.error('Firebase init:',e);return false;}
}

// ===== LOAD =====
async function loadData(){
  if(!db||!rid){showError('Sin configuración de Firebase. Pedile el link completo a tu instructora.');return;}
  try{
    document.getElementById('hdrStatus').textContent='Cargando…';
    const residentsDoc=await db.collection('residentes').doc('residents').get();
    if(residentsDoc.exists){
      const rs=residentsDoc.data().items||[];
      residente=rs.find(r=>r.id===rid);
    }
    if(!residente){showError('Residente no encontrado. Verificá el link con tu instructora.');return;}
    document.getElementById('hdrName').textContent=`${residente.nombre} ${residente.apellido}`;
    document.getElementById('hdrSub').textContent=residente.anio+' · Residencia Neo-Pediátrica';
    document.getElementById('hdrStatus').textContent='';
    const cols=['guardias','procs','ateneos','casos'];
    const docs=await Promise.all(cols.map(k=>db.collection('residentes').doc(k).get()));
    docs.forEach((doc,i)=>{
      const k=cols[i];
      if(doc.exists&&Array.isArray(doc.data().items))
        S[k]=doc.data().items.filter(x=>x.rid===rid);
      else S[k]=[];
    });
    document.getElementById('bnav').style.display='flex';
    render();
  }catch(e){
    console.error(e);
    showError('Error al cargar: '+e.message);
  }
}

async function saveCol(colName){
  if(!db||saving)return;
  saving=true;
  document.getElementById('hdrStatus').textContent='⏳ Guardando…';
  try{
    const doc=await db.collection('residentes').doc(colName).get();
    const all=doc.exists?(doc.data().items||[]):[];
    const otros=all.filter(x=>x.rid!==rid);
    await db.collection('residentes').doc(colName).set({items:[...otros,...S[colName]],ts:Date.now()});
    toast('✅ Guardado');
  }catch(e){
    console.error(e);toast('❌ Error al guardar','#c53030');
  }
  document.getElementById('hdrStatus').textContent='';
  saving=false;
}

// ===== RENDER =====
function setTab(t){
  tab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('tab-'+t)?.classList.add('act');
  render();
  window.scrollTo(0,0);
}
function render(){
  if(tab==='guardias')renderGuardias();
  else if(tab==='procs')renderProcs();
  else if(tab==='ateneos')renderAteneos();
  else if(tab==='casos')renderCasos();
}

// ===== GUARDIAS =====
function renderGuardias(){
  const {y,m}=_gcal;
  const fd1=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const ml=new Date(y,m,1).toLocaleString('es-AR',{month:'long',year:'numeric'});
  const ms=`${y}-${String(m+1).padStart(2,'0')}`;
  const gd={};
  S.guardias.forEach(g=>{if(g.fecha&&g.fecha.startsWith(ms)){const d=parseInt(g.fecha.split('-')[2]);if(!gd[d])gd[d]=[];gd[d].push(g);}});
  const gm=Object.values(gd).reduce((s,a)=>s+a.length,0);
  const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cal=`<div class="cal-hdr">${DN.map(d=>`<div>${d.slice(0,1)}</div>`).join('')}</div><div class="cal-grid">`;
  for(let i=0;i<fd1;i++)cal+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d),isFds=date.getDay()===0||date.getDay()===6;
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const gs=gd[d]||[],hasG=gs.length>0,isToday=ds===hoy();
    let cls='cd';if(hasG)cls+=isFds?' gf':' g';if(isToday)cls+=' today';
    cal+=`<div class="${cls}" onclick="tapDay('${ds}',${isFds})"><span>${d}</span>${hasG?`<div class="dot"></div>`:''}</div>`;
  }
  cal+=`</div>`;
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="sr">
      <div class="sb"><div class="n">${gm}</div><div class="l">Este mes</div></div>
      <div class="sb"><div class="n">${S.guardias.filter(g=>g.tipo==='fds').length}</div><div class="l">Fin de semana</div></div>
      <div class="sb"><div class="n">${S.guardias.length}</div><div class="l">Total</div></div>
    </div>
    <div class="cal-nav">
      <button onclick="_gcal.m--;if(_gcal.m<0){_gcal.m=11;_gcal.y--;}renderGuardias()">◀</button>
      <span class="mn">${ml}</span>
      <button onclick="_gcal.m++;if(_gcal.m>11){_gcal.m=0;_gcal.y++;}renderGuardias()">▶</button>
    </div>
    <p style="font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:10px">
      Tocá un día para registrar una guardia ·
      <span style="background:var(--pri-bg);color:var(--pri);padding:1px 6px;border-radius:10px;font-weight:700;font-size:.68rem">Semana</span>
      <span style="background:#fefcbf;color:#744210;padding:1px 6px;border-radius:10px;font-weight:700;font-size:.68rem;margin-left:3px">Fin de semana</span>
    </p>
    ${cal}
  </div>`;
}

function tapDay(ds,isFds){
  const existing=S.guardias.filter(g=>g.fecha===ds);
  const [y,m,d]=ds.split('-');
  om(`${d}/${m}/${y} · ${isFds?'Fin de semana':'Día de semana'}`,`
    ${existing.length?`<div style="margin-bottom:14px">
      <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Registradas este día</div>
      ${existing.map(g=>`<div style="display:flex;align-items:center;gap:8px;background:var(--bg);padding:9px 12px;border-radius:8px;margin-bottom:6px">
        <span style="font-size:.85rem">🏥 <strong>${g.serv||'Guardia'}</strong>${g.obs?` · <em style="color:var(--muted)">${g.obs.substring(0,30)}</em>`:''}</span>
        <button onclick="removeItem('guardias','${g.id}');cm();renderGuardias()" class="btn br bsm" style="margin-left:auto;padding:4px 8px;font-size:.72rem">🗑</button>
      </div>`).join('')}
    </div><hr style="border:none;border-top:1px solid var(--brd);margin-bottom:14px">`:''}
    <div class="fg"><label>Servicio</label>
      <select id="fserv"><option>Guardia pediátrica</option><option>Neonatología</option><option>UCIP</option><option>Rotación externa</option></select></div>
    <div class="fg"><label>Observaciones (opcional)</label><textarea id="fobs" placeholder="Casos relevantes, novedades…"></textarea></div>`,
    `<button class="btn bp" onclick="addGuardia('${ds}','${isFds?'fds':'semana'}')">✅ Registrar guardia</button>`);
}

function addGuardia(ds,tipo){
  S.guardias.push({id:uid(),rid,fecha:ds,tipo,serv:document.getElementById('fserv')?.value||'Guardia pediátrica',obs:document.getElementById('fobs')?.value||''});
  saveCol('guardias');cm();renderGuardias();
}

// ===== PROCEDIMIENTOS =====
function renderProcs(){
  const pnc={},ppc={};
  S.procs.forEach(p=>{if(PNEO.includes(p.tipo))pnc[p.tipo]=(pnc[p.tipo]||0)+1;if(PPED.includes(p.tipo))ppc[p.tipo]=(ppc[p.tipo]||0)+1;});
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="card-title">🟢 Neonatología</div>
    <div>${PNEO.map(p=>{const c=pnc[p]||0;return`<div class="pi"><span>${p}</span><span class="pcnt${c===0?' z':''}" onclick="openProc('${p.replace(/'/g,"\\'")}',${PNEO.includes(p)?'true':'false'})">${c}</span></div>`;}).join('')}</div>
  </div>
  <div class="card">
    <div class="card-title">🔵 Pediatría</div>
    <div>${PPED.map(p=>{const c=ppc[p]||0;return`<div class="pi"><span>${p}</span><span class="pcnt${c===0?' z':''}" onclick="openProc('${p.replace(/'/g,"\\'")}',false)">${c}</span></div>`;}).join('')}</div>
  </div>`;
}

function openProc(tipo,isNeo){
  om(`Registrar: ${tipo}`,`
    <div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${hoy()}"></div>
    <div class="fg"><label>Nivel de autonomía</label>
      <select id="fniv"><option value="observado">Observado</option><option value="supervisado">Supervisado</option><option value="autónomo">Autónomo</option></select></div>
    <div class="fg"><label>Supervisor/a</label><input id="fsup" placeholder="Nombre del supervisor"></div>
    <div class="fg"><label>Observaciones</label><textarea id="fobs" placeholder="Incidencias, aprendizaje…"></textarea></div>`,
    `<button class="btn bp" onclick="addProc('${tipo.replace(/'/g,"\\'")}')">✅ Registrar</button>`);
}

function addProc(tipo){
  S.procs.push({id:uid(),rid,tipo,fecha:document.getElementById('ff2').value||hoy(),niv:document.getElementById('fniv').value,sup:document.getElementById('fsup')?.value||'',obs:document.getElementById('fobs')?.value||''});
  saveCol('procs');cm();renderProcs();
}

// ===== ATENEOS =====
function renderAteneos(){
  const recientes=S.ateneos.slice().reverse().slice(0,25);
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="sr">
      <div class="sb"><div class="n">${S.ateneos.length}</div><div class="l">Total</div></div>
      <div class="sb"><div class="n">${S.ateneos.filter(x=>x.rol==='expositor').length}</div><div class="l">Como expositor</div></div>
      <div class="sb"><div class="n">${S.ateneos.filter(x=>{const[y,m]=x.fecha.split('-');const n=new Date();return y===String(n.getFullYear())&&m===String(n.getMonth()+1).padStart(2,'0');}).length}</div><div class="l">Este mes</div></div>
    </div>
    <button class="btn bp" onclick="openAteneo()" style="margin-bottom:14px">＋ Registrar ateneo</button>
    ${!recientes.length?`<div class="empty-msg">Sin ateneos registrados aún</div>`:`
    <div>${recientes.map(x=>`<div class="ri">
      <div style="flex:1">
        <div style="font-weight:700;font-size:.85rem">${x.titulo}</div>
        <div class="meta">${TIPOS_AT[x.tipo]||x.tipo} · ${fd(x.fecha)}${x.docente?` · ${x.docente}`:''}</div>
      </div>
      <span style="background:${x.rol==='expositor'?'#c6f6d5':'#bee3f8'};color:${x.rol==='expositor'?'#276749':'#2c5282'};padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700;flex-shrink:0">${x.rol||'asistente'}</span>
    </div>`).join('')}</div>`}
  </div>`;
}

function openAteneo(){
  om('Registrar Ateneo / Actividad',`
    <div class="fg"><label>Tipo</label>
      <select id="ftipo">
        <option value="clinico">🏥 Ateneo clínico</option>
        <option value="bibliografico">📚 Revisión bibliográfica</option>
        <option value="morbimortalidad">⚠️ Morbi-mortalidad</option>
        <option value="simulacion">🎯 Simulación clínica</option>
        <option value="clase">📝 Clase / Taller</option>
      </select></div>
    <div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${hoy()}"></div>
    <div class="fg"><label>Título / Tema</label><input id="ftit" placeholder="Ej: Sepsis neonatal"></div>
    <div class="fr">
      <div class="fg"><label>Docente</label><input id="fdocente" placeholder="Nombre"></div>
      <div class="fg"><label>Mi rol</label><select id="frol"><option value="asistente">Asistente</option><option value="expositor">Expositor/a</option><option value="coordinador">Coordinador/a</option></select></div>
    </div>`,
    `<button class="btn bp" onclick="addAteneo()">✅ Registrar</button>`);
}

function addAteneo(){
  const t=document.getElementById('ftit').value.trim();if(!t){alert('Ingresá el título.');return;}
  S.ateneos.push({id:uid(),rid,tipo:document.getElementById('ftipo').value,titulo:t,fecha:document.getElementById('ff2').value||hoy(),docente:document.getElementById('fdocente')?.value||'',rol:document.getElementById('frol').value});
  saveCol('ateneos');cm();renderAteneos();
}

// ===== CASOS CLÍNICOS =====
function renderCasos(){
  const hoyStr=hoy();
  const hoyItems=S.casos.filter(c=>c.fecha===hoyStr);
  const ms=hoyStr.substring(0,7);
  const mesTot=S.casos.filter(c=>c.fecha.startsWith(ms)).length;
  const prev=S.casos.filter(c=>c.fecha!==hoyStr).slice().reverse().slice(0,20);
  const ambLbl={internacion:'🏥 Internación',shockroom:'🚨 Shock room',consultorio:'🏠 Consultorio',neonatal:'👶 Área neonatal'};
  const cBg={alta:'#fed7d7',media:'#fefcbf',baja:'#c6f6d5'};
  const cTxt={alta:'#c53030',media:'#744210',baja:'#276749'};
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="sr">
      <div class="sb"><div class="n">${hoyItems.length}</div><div class="l">Hoy</div></div>
      <div class="sb"><div class="n">${mesTot}</div><div class="l">Este mes</div></div>
      <div class="sb"><div class="n">${S.casos.length}</div><div class="l">Total</div></div>
    </div>
    <button class="btn bp" onclick="openCaso()" style="margin-bottom:14px">＋ Registrar caso clínico</button>
    ${hoyItems.length?`<div class="hoy-section">
      <div class="hoy-title">📅 Hoy — ${fd(hoyStr)} · ${hoyItems.length} caso${hoyItems.length!==1?'s':''}</div>
      ${hoyItems.map(c=>`<div style="padding:8px 0;border-bottom:1px solid rgba(39,103,73,.15);display:flex;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-size:.88rem;font-weight:800">${c.diag||'Sin diagnóstico'}</div>
          <div style="font-size:.72rem;margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span style="color:var(--neo)">${ambLbl[c.amb]||c.amb||'—'}</span>
            ${c.compl?`<span style="background:${cBg[c.compl]};color:${cTxt[c.compl]};padding:1px 7px;border-radius:10px;font-weight:700;font-size:.68rem">${c.compl}</span>`:''}
            ${c.rot?`<span style="color:var(--muted)">· ${c.rot}</span>`:''}
          </div>
          ${c.comp?`<div style="font-size:.74rem;color:var(--muted);margin-top:3px;font-style:italic">${c.comp.substring(0,70)}</div>`:''}
        </div>
        <button onclick="removeItem('casos','${c.id}');renderCasos()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.9rem;padding:2px;flex-shrink:0">✕</button>
      </div>`).join('')}
    </div>`:''}
    ${prev.length?`<div style="margin-top:12px">
      <div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Casos anteriores</div>
      ${prev.map(c=>`<div class="ri">
        <div style="flex:1">
          <div style="font-weight:700;font-size:.85rem">${c.diag||'Sin diagnóstico'}</div>
          <div class="meta">${ambLbl[c.amb]||c.amb||'—'} · ${fd(c.fecha)}${c.rot?` · ${c.rot}`:''}</div>
        </div>
        ${c.compl?`<span style="background:${cBg[c.compl]};color:${cTxt[c.compl]};padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700;flex-shrink:0">${c.compl}</span>`:''}
      </div>`).join('')}
    </div>`:`<div class="empty-msg" style="margin-top:8px">Registrá tu primer caso del día</div>`}
  </div>`;
}

function openCaso(){
  om('Registrar caso clínico',`
    <div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${hoy()}"></div>
    <div class="fg"><label>Diagnóstico principal</label><input id="fdiag" placeholder="Ej: Bronquiolitis moderada, Sepsis neonatal…"></div>
    <div class="fr">
      <div class="fg"><label>Ámbito</label><select id="famb">
        <option value="internacion">🏥 Internación</option>
        <option value="shockroom">🚨 Shock room</option>
        <option value="consultorio">🏠 Consultorio</option>
        <option value="neonatal">👶 Área neonatal</option>
      </select></div>
      <div class="fg"><label>Complejidad</label><select id="fcompl">
        <option value="baja">Baja</option>
        <option value="media">Media</option>
        <option value="alta">Alta</option>
      </select></div>
    </div>
    <div class="fg"><label>Rotación</label><input id="frot" placeholder="Rotación actual"></div>
    <div class="fg"><label>Competencia trabajada</label><textarea id="fcomp" placeholder="Ej: Diagnóstico diferencial del distrés respiratorio…"></textarea></div>
    <div class="fg"><label>Reflexión / aprendizaje</label><textarea id="frefl" placeholder="¿Qué aprendiste de este caso?"></textarea></div>`,
    `<button class="btn bp" onclick="addCaso()">✅ Guardar caso</button>`);
}

function addCaso(){
  const d=document.getElementById('fdiag').value.trim();
  if(!d){alert('Ingresá el diagnóstico.');return;}
  S.casos.push({id:uid(),rid,fecha:document.getElementById('ff2').value||hoy(),diag:d,amb:document.getElementById('famb').value,compl:document.getElementById('fcompl').value,rot:document.getElementById('frot')?.value||'',comp:document.getElementById('fcomp')?.value||'',refl:document.getElementById('frefl')?.value||''});
  saveCol('casos');cm();renderCasos();
}
  const hoyStr=hoy();
  const hoyItems=S.pacientes.filter(p=>p.fecha===hoyStr);
  const hoyTotP=hoyItems.reduce((s,p)=>s+(+p.nPacientes||0),0);
  const hoyTotPr=hoyItems.reduce((s,p)=>s+(+p.nProcs||0),0);
  const ms=hoyStr.substring(0,7);
  const mesTot=S.pacientes.filter(p=>p.fecha.startsWith(ms)).reduce((s,p)=>s+(+p.nPacientes||0),0);
  const recientes=S.pacientes.slice().reverse().filter(p=>p.fecha!==hoyStr).slice(0,15);
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="sr">
      <div class="sb"><div class="n">${hoyTotP}</div><div class="l">Hoy — pac.</div></div>
      <div class="sb"><div class="n">${hoyTotPr}</div><div class="l">Hoy — proc.</div></div>
      <div class="sb"><div class="n">${mesTot}</div><div class="l">Este mes</div></div>
    </div>
    <button class="btn bp" onclick="openPacientes()" style="margin-bottom:14px">＋ Cargar pacientes del día</button>
    ${hoyItems.length?`<div class="hoy-section">
      <div class="hoy-title">📅 Hoy — ${fd(hoyStr)}</div>
      ${hoyItems.map(p=>`<div style="display:flex;align-items:center;gap:8px;font-size:.85rem;padding:4px 0">
        <span style="flex:1">🏥 <strong>${p.sector}</strong></span>
        <span><strong>${p.nPacientes}</strong> pac. · <strong>${p.nProcs||0}</strong> proc.</span>
        <button onclick="removeItem('pacientes','${p.id}');renderPacientes()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.9rem;padding:2px">✕</button>
      </div>`).join('')}
    </div>`:''}
    ${recientes.length?`<div>
      <div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Días anteriores</div>
      ${recientes.map(p=>`<div class="ri">
        <div style="flex:1"><div style="font-weight:600;font-size:.85rem">${p.sector}</div><div class="meta">${fd(p.fecha)}</div></div>
        <div style="text-align:right;font-size:.85rem"><strong>${p.nPacientes}</strong> <span style="color:var(--muted)">pac.</span> · <strong>${p.nProcs||0}</strong> <span style="color:var(--muted)">proc.</span></div>
      </div>`).join('')}
    </div>`:`<div class="empty-msg">Empezá cargando los pacientes de hoy</div>`}
  </div>`;
}

function openPacientes(){
  om('Cargar pacientes del día',`
    <div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${hoy()}"></div>
    <div class="fg"><label>Sector</label><select id="fsect">${SECTORES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="fr">
      <div class="fg"><label>N° pacientes</label><input type="number" id="fnp" min="0" value="0" inputmode="numeric" style="font-size:1.3rem;font-weight:800;text-align:center"></div>
      <div class="fg"><label>N° procedimientos</label><input type="number" id="fnpr" min="0" value="0" inputmode="numeric" style="font-size:1.3rem;font-weight:800;text-align:center"></div>
    </div>
    <div class="fg"><label>Observaciones</label><textarea id="fobs" placeholder="Patología prevalente, casos relevantes…"></textarea></div>`,
    `<button class="btn bp" onclick="addPacientes()">✅ Guardar</button>`);
}

function addPacientes(){
  S.pacientes.push({id:uid(),rid,fecha:document.getElementById('ff2').value||hoy(),sector:document.getElementById('fsect').value,nPacientes:+document.getElementById('fnp').value||0,nProcs:+document.getElementById('fnpr').value||0,obs:document.getElementById('fobs')?.value||''});
  saveCol('pacientes');cm();renderPacientes();
}

function removeItem(col,id){
  S[col]=S[col].filter(x=>x.id!==id);
  saveCol(col);toast('🗑 Eliminado','#718096');
}

// ===== MODALS =====
function om(title,body,footer){
  document.getElementById('mc').innerHTML=`<div class="mh"><div class="mt">${title}</div><button class="mx" onclick="cm()">✕</button></div>${body}<div class="mf">${footer}</div>`;
  document.getElementById('mo').classList.add('open');
}
function cm(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))cm();});

function showError(msg){
  document.getElementById('hdrName').textContent='Portal Residente';
  document.getElementById('hdrSub').textContent='';
  document.getElementById('hdrStatus').textContent='';
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:30px"><div style="font-size:2.5rem;margin-bottom:12px">❌</div><p style="color:var(--muted);font-size:.88rem">${msg}</p></div>`;
}

// ===== STARTUP =====
if(!rid){
  showError('Link inválido — falta el ID del residente.<br>Pedile el link correcto a tu instructora.');
}else{
  // Try Firebase config from URL hash first (instructor-generated link)
  const hashData=location.hash.slice(1);
  if(hashData){
    try{
      const cfg=JSON.parse(atob(hashData));
      localStorage.setItem('fb_config',JSON.stringify(cfg));
      initFirebase(cfg);
    }catch(e){console.error('Hash config:',e);}
  }
  // Fallback to localStorage
  if(!db){
    const saved=localStorage.getItem('fb_config');
    if(saved){try{initFirebase(JSON.parse(saved));}catch(e){}}
  }
  if(db){loadData();}
  else{showError('Sin configuración de Firebase.<br>Pedile el link completo a tu instructora.');}
}
</script>
</body>
</html>
