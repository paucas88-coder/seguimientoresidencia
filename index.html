<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Residencia Neo-Pediátrica · Sanatorio 9 de Julio</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{--pri:#2c5282;--pri-bg:#ebf8ff;--pri-acc:#4299e1;--neo:#276749;--neo-bg:#f0fff4;--neo-acc:#48bb78;--txt:#2d3748;--muted:#718096;--brd:#e2e8f0;--bg:#f7fafc;--wht:#fff;--red:#e53e3e;--r:8px;--sh:0 1px 3px rgba(0,0,0,.1)}
body{background:var(--bg);color:var(--txt);min-height:100vh}
.app{max-width:1160px;margin:0 auto;padding:14px}
.hdr{background:var(--wht);border-radius:var(--r);padding:14px 18px;margin-bottom:12px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr h1{font-size:1rem;font-weight:800;flex:1}.hdr small{font-size:.7rem;color:var(--muted);display:block}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.04em}
.tabs{display:flex;gap:3px;background:var(--wht);border-radius:var(--r);padding:5px;margin-bottom:12px;box-shadow:var(--sh);overflow-x:auto}
.tab{padding:7px 13px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--muted);white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--bg)}.tab.act{background:var(--pri-bg);color:var(--pri);font-weight:700}
.subtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.stab{padding:5px 11px;border-radius:20px;border:1px solid var(--brd);background:var(--bg);cursor:pointer;font-size:.75rem;font-weight:600;color:var(--muted);transition:all .15s}
.stab:hover{border-color:var(--pri-acc)}.stab.act{background:var(--pri);color:#fff;border-color:var(--pri)}
.stab-neo.act{background:var(--neo);border-color:var(--neo)}.stab-otras.act{background:#718096;border-color:#718096}
.card{background:var(--wht);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:.92rem;font-weight:700}.cs{font-size:.72rem;color:var(--muted);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:var(--bg);border-radius:var(--r);padding:13px;text-align:center;border:1px solid var(--brd);border-left:3px solid var(--pri-acc)}
.stat .n{font-size:1.5rem;font-weight:800;line-height:1;margin-bottom:3px;color:var(--pri)}
.stat .l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.88;transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.bp{background:var(--pri);color:#fff}.bn{background:var(--neo);color:#fff}
.bg2{background:var(--bg);color:var(--txt);border:1px solid var(--brd)}.br{background:var(--red);color:#fff}
.bsm{padding:4px 9px;font-size:.72rem}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:580px){.fr{grid-template-columns:1fr}}
label{display:block;font-size:.72rem;font-weight:700;margin-bottom:4px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;border:1px solid var(--brd);border-radius:6px;padding:7px 9px;font-size:.82rem;background:var(--wht);transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri-acc);box-shadow:0 0 0 3px rgba(66,153,225,.15)}
textarea{min-height:68px;resize:vertical}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.79rem}
th{padding:7px 10px;background:var(--bg);border-bottom:2px solid var(--brd);text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg)}
.sc{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700}
.sh{background:#c6f6d5;color:#276749}.sm{background:#fefcbf;color:#744210}.sl{background:#fed7d7;color:#c53030}.sbl{background:#bee3f8;color:#2c5282}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:14px}
.mo.open{display:flex}
.mc{background:var(--wht);border-radius:12px;padding:22px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-size:.95rem;font-weight:700}
.mx{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:3px 6px;border-radius:4px}
.mx:hover{background:var(--bg)}
.mf{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--brd)}
.sd{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--brd);padding-bottom:5px;margin:18px 0 12px}
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
.ei{font-size:2.2rem;margin-bottom:8px}.empty p{font-size:.8rem}
.pw{background:var(--brd);border-radius:20px;height:8px;overflow:hidden;margin-top:5px}
.pb{height:100%;border-radius:20px;transition:width .3s}
.pb-pri{background:var(--pri-acc)}.pb-neo{background:var(--neo-acc)}
.rh{background:linear-gradient(135deg,#2c5282,#276749);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:22px;margin:-18px -18px 18px}
.cli{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--brd);font-size:.82rem}
.cli:last-child{border-bottom:none}
.clc{width:16px;height:16px;accent-color:var(--pri);flex-shrink:0}
.cln{margin-left:auto;font-size:.7rem;font-weight:700;background:var(--bg);padding:2px 7px;border-radius:20px;color:var(--muted)}
.rubric-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.rubric-row:last-child{border-bottom:none}
.rlab{flex:1;font-size:.8rem;min-width:150px}
.rbts{display:flex;gap:4px}
.rbt{padding:4px 10px;border-radius:20px;border:1px solid var(--brd);font-size:.72rem;font-weight:600;cursor:pointer;background:var(--bg);transition:all .1s;white-space:nowrap}
.rbt:hover{border-color:var(--pri-acc)}
.rbt.sel-1{background:#fed7d7;color:#c53030;border-color:#c53030}
.rbt.sel-2{background:#fefcbf;color:#744210;border-color:#d69e2e}
.rbt.sel-3{background:#bee3f8;color:#2c5282;border-color:#4299e1}
.rbt.sel-4{background:#c6f6d5;color:#276749;border-color:#48bb78}
.csec{background:var(--bg);border-radius:6px;padding:12px;border:1px solid var(--brd);margin-bottom:10px}
.csec-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.alert-i{background:var(--pri-bg);border-left:3px solid var(--pri-acc);color:var(--pri);padding:9px 12px;border-radius:6px;font-size:.78rem;margin-bottom:12px}
#saveStatus{font-size:.72rem;color:var(--muted)}
.cat-neo{background:#c6f6d5;color:#276749}.cat-ped{background:#bee3f8;color:#2c5282}.cat-otras{background:#e2e8f0;color:#4a5568}
@media print{.tabs,.subtabs,.hdr button,.btn,.mo{display:none!important}.card{box-shadow:none;border:1px solid var(--brd)}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div style="flex:1"><h1>Sistema de Seguimiento · Residencia Neo-Pediátrica</h1><small>Sanatorio 9 de Julio S.A. · San Miguel de Tucumán · Dra. Mortarotti / Dra. Castillo Lucena</small></div>
    <div id="rsel" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span id="saveStatus"></span>
      <button class="btn bg2 bsm" id="gsBtn" onclick="oSettings()">🔥 Firebase</button>
      <button class="btn bg2 bsm" onclick="exportJSON()">💾 Exportar</button>
      <button class="btn bg2 bsm" onclick="document.getElementById('importFile').click()">📂 Importar</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <div class="tabs" id="tbar">
    <button class="tab" onclick="setTab('perfil')">👤 Perfil</button>
    <button class="tab" onclick="setTab('rotaciones')">🔄 Rotaciones</button>
    <button class="tab" onclick="setTab('evals')">⭐ Evaluaciones</button>
    <button class="tab" onclick="setTab('procs')">🏥 Procedimientos</button>
    <button class="tab" onclick="setTab('guardias')">🌙 Guardias</button>
    <button class="tab" onclick="setTab('portafolio')">📚 Portafolio</button>
    <button class="tab" onclick="setTab('ateneos')">📖 Ateneos</button>
    <button class="tab" onclick="setTab('ciencia')">🔬 Producción Científica</button>
    <button class="tab" onclick="setTab('licencias')">📅 Licencias</button>
    <button class="tab" onclick="setTab('comunidad')">🌍 Com. Extensión</button>
    <button class="tab" onclick="setTab('reporte')">📊 Reporte</button>
  </div>
  <div id="content"></div>
</div>
<div class="mo" id="mo"><div class="mc" id="mc"></div></div>
<datalist id="dl-neo"><option>Neonatología internación</option><option>UCIN nivel II</option><option>UCIN nivel III</option><option>Recepción / Sala de partos</option><option>Imágenes / Medicina Fetal</option><option>Cirugía neonatal</option><option>Gastroenterología neonatal</option><option>Infectología – H. Niños Jesús</option><option>Genética – H. Niños Jesús</option><option>Hemato-oncología – H. Niños Jesús</option><option>SECRIP – H. Clínicas</option></datalist>
<datalist id="dl-ped"><option>Pediatría clínica (piso)</option><option>Guardia pediátrica</option><option>UCIP</option><option>Consultorio externo</option><option>Consultorio Alto Riesgo</option><option>Adolescencia</option><option>Infectología – H. Niños Jesús</option><option>Cirugía infantil</option><option>Imágenes</option><option>Gastroenterología infantil</option><option>Hemato-oncología – H. Niños Jesús</option><option>Genética – H. Niños Jesús</option><option>SECRIP – H. Clínicas</option><option>Medicina Fetal</option></datalist>

<script>
// ===== ESTADO =====
let S={residents:[],evals:[],procs:[],guardias:[],casos:[],rots:[],stats:[],ciencia:[],licencias:[],comunidad:[],ateneos:[],pacientes:[],rid:null,tab:'perfil'};
let rotFilter='all';
let repMode='semestral',repYear=new Date().getFullYear(),repSem=new Date().getMonth()<6?1:2;

// ===== CONSTANTES =====
const ANOS=['1° año','2° año','3° año','4° año','5° año'];
const PNEO=['Intubación endotraqueal','Extubación programada','Catéter venoso umbilical (CUV)','Catéter arterial umbilical (CAU)','Catéter percutáneo (PICC)','Acceso venoso periférico neonatal','Punción lumbar neonatal','Toracocentesis / Drenaje pleural','Paracentesis neonatal','CPAP nasal – inicio y ajuste','VAFO – inicio y ajuste','ARM/VMA neonatal','RCP neonatal avanzada','Exanguinotransfusión','Surfactante exógeno','Fototerapia – indicación y monitoreo','Sondaje orogástrico / nasogástrico','Ecografía transfontanelar básica','Hipotermia terapéutica','Interpretación de gases y laboratorio'];
const PPED=['Punción lumbar pediátrica','Acceso venoso periférico','Acceso intraóseo (IO)','Catéter venoso central','Intubación secuencia rápida (ISR)','Extubación programada pediátrica','ARM/VMA pediátrica','CPAP / BiPAP pediátrico','RCP pediátrica avanzada','Cardioversión / desfibrilación','Toracocentesis pediátrica','Paracentesis pediátrica','Artrocentesis','Reducción de luxaciones','Sutura de heridas','Cateterismo vesical','Sondaje nasogástrico','Nebulización / aerosolterapia','Monitoreo hemodinámico invasivo','Colocación en CAFO'];
const MCEX=['Anamnesis y examen físico','Diagnóstico diferencial','Plan de estudio','Plan terapéutico','Comunicación con familia','Humanismo / profesionalismo','Organización y eficiencia'];
const RCOMP=['Conocimiento teórico','Razonamiento clínico','Habilidades prácticas','Comunicación con familia','Profesionalismo y ética','Trabajo en equipo'];
const RNIVS=['Insuficiente','En desarrollo','Satisfactorio','Destacado'];
const TLBL={minicex:'Mini-CEX',trescientos:'360°',simulacion:'Simulación clínica',teorico:'Examen teórico',paseSala:'Pase de sala',auditoria:'Auditoría HC'};
const TICO={minicex:'🩺',trescientos:'🔁',simulacion:'🎯',teorico:'📝',paseSala:'🏥',auditoria:'📋'};
const ROT_LBL={'1':'Insuficiente','2':'En desarrollo','3':'Satisfactorio','4':'Destacado'};
const ROT_CSS={'1':'sl','2':'sm','3':'sbl','4':'sh'};
const CAT_LBL={neo:'Neonatología',ped:'Pediatría',otras:'Otras'};
const CAT_CSS={neo:'cat-neo',ped:'cat-ped',otras:'cat-otras'};
const COLLS=['residents','evals','procs','guardias','casos','rots','stats','ciencia','licencias','comunidad','ateneos','pacientes'];

// ===== UTILIDADES =====
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const hoy=()=>new Date().toISOString().split('T')[0];
const fd=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`};
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const scl=(s,mx=10)=>{const p=s/mx;return p>=.7?'sh':p>=.5?'sm':'sl'};
const gR=id=>S.residents.find(r=>r.id===id);
const aR=()=>gR(S.rid);

function fpd(arr,df){
  if(repMode==='global')return arr;
  const y=String(repYear);
  return arr.filter(x=>{
    if(!x[df])return false;
    const[ay,am]=String(x[df]).split('-');
    if(repMode==='anual'){const mo=parseInt(am);return(ay===y&&mo>=6)||(ay===String(parseInt(y)+1)&&mo<=5);}
    const m=parseInt(am);
    return ay===y&&(repSem===1?m<=6:m>6);
  });
}

// ===== FIREBASE =====
const IS_AS=typeof google!=='undefined'&&typeof google.script!=='undefined';
let db=null;

function initFirebase(cfg){
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    db=firebase.firestore();
    const b=document.getElementById('gsBtn');
    if(b){b.textContent='🔥 Firebase ✅';b.style.color='var(--neo)';}
    return true;
  }catch(e){console.error('Firebase init:',e);return false;}
}

function updFbBtn(){
  const b=document.getElementById('gsBtn');if(!b)return;
  b.textContent=db?'🔥 Firebase ✅':'🔥 Firebase';
  b.style.color=db?'var(--neo)':'var(--red)';
}

// ===== GUARDAR / CARGAR =====
let _saveTimer=null;
function save(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    setSt('saving');
    if(IS_AS){
      const data=JSON.stringify(COLLS.reduce((o,k)=>(o[k]=S[k],o),{}));
      google.script.run.withSuccessHandler(()=>setSt('ok')).withFailureHandler(()=>setSt('error')).saveData(data);
      return;
    }
    if(!db){setSt('error');return;}
    try{
      const batch=db.batch();
      COLLS.forEach(k=>batch.set(db.collection('residentes').doc(k),{items:S[k]||[],ts:Date.now()}));
      await batch.commit();
      setSt('ok');
    }catch(e){console.error('Save:',e);setSt('error');}
  },600);
}

async function load(){
  setSt('loading');
  document.getElementById('content').innerHTML='<div class="card"><div class="empty"><div class="ei">⏳</div><p>Cargando datos…</p></div></div>';
  if(IS_AS){
    google.script.run
      .withSuccessHandler(j=>{
        try{const d=JSON.parse(j);COLLS.forEach(k=>{if(Array.isArray(d[k]))S[k]=d[k];});S.rid=S.residents[0]?.id||null;}catch(e){}
        setSt('ok');render();
      })
      .withFailureHandler(e=>{console.error(e);setSt('error');render();})
      .getData();
    return;
  }
  if(!db){render();return;}
  try{
    const docs=await Promise.all(COLLS.map(k=>db.collection('residentes').doc(k).get()));
    docs.forEach((doc,i)=>{
      if(doc.exists&&Array.isArray(doc.data().items))
        S[COLLS[i]]=[...new Map(doc.data().items.map(x=>[x.id,x])).values()];
    });
    S.rid=S.residents[0]?.id||null;
    setSt('ok');
  }catch(e){console.error('Load:',e);setSt('error');}
  render();
}

function setSt(s){
  const el=document.getElementById('saveStatus');if(!el)return;
  const m={saving:'⏳ Guardando…',loading:'⏳ Cargando…',ok:'✅ Guardado',error:'❌ Error'};
  el.textContent=m[s]||'';
  if(s==='ok')setTimeout(()=>{el.textContent='';},3000);
}

// ===== CONFIGURACIÓN FIREBASE =====
function oSettings(){
  const cfg=localStorage.getItem('fb_config')||'';
  om('🔥 Configurar Firebase',`
    <div class="alert-i" style="margin-bottom:12px">
      <strong>¿Dónde encontrar la config?</strong><br>
      Firebase Console → Tu proyecto → ⚙️ Configuración del proyecto → Tu app web → Copiar el objeto <code>firebaseConfig</code>
    </div>
    <div class="fg"><label>Pegá aquí el firebaseConfig (objeto JSON)</label>
    <textarea id="ffbcfg" style="min-height:140px;font-family:monospace;font-size:.74rem" placeholder='{\n  "apiKey": "AIza...",\n  "authDomain": "proyecto.firebaseapp.com",\n  "projectId": "proyecto-id",\n  "storageBucket": "proyecto.appspot.com",\n  "messagingSenderId": "123456789",\n  "appId": "1:123456789:web:abc123"\n}'>${cfg}</textarea></div>
    <div style="font-size:.78rem;margin-top:4px">Estado: <strong style="color:${db?'var(--neo)':'var(--red)'}">${db?'🔥 Conectado a Firebase':'⚠️ Sin configurar — los datos no se guardan'}</strong></div>`,
    `<button class="btn br bsm" onclick="clearFirebase()">Desconectar</button>
    <button class="btn bg2" onclick="cm()">Cancelar</button>
    <button class="btn bp" onclick="saveFirebaseCfg()">Conectar y cargar datos</button>`);
}

function saveFirebaseCfg(){
  let raw=document.getElementById('ffbcfg').value.trim();
  try{
    raw=raw.replace(/^const\s+\w+\s*=\s*/,'').replace(/;?\s*$/,'');
    const cfg=JSON.parse(raw);
    if(!cfg.projectId)throw new Error('Falta projectId');
    if(initFirebase(cfg)){
      localStorage.setItem('fb_config',raw);
      cm();load();
    }else{alert('No se pudo conectar. Revisá la configuración.');}
  }catch(e){alert('Error en la configuración: '+e.message);}
}

function clearFirebase(){
  db=null;localStorage.removeItem('fb_config');updFbBtn();cm();
}

// ===== EXPORT / IMPORT JSON =====
function exportJSON(){
  const data=JSON.stringify(COLLS.reduce((o,k)=>(o[k]=S[k],o),{}),null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`residentes_${hoy()}.json`;a.click();
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  if(!confirm('Esto reemplaza todos los datos actuales. ¿Continuás?')){e.target.value='';return;}
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      COLLS.forEach(k=>{if(Array.isArray(d[k]))S[k]=d[k];});
      S.rid=S.residents[0]?.id||null;
      save();render();alert('✅ Importado correctamente.');
    }catch(err){alert('❌ Archivo no válido.');}
    e.target.value='';
  };
  r.readAsText(file);
}

// ===== RENDER =====
function render(){rSel();rTabs();rContent();}
function rSel(){
  const el=document.getElementById('rsel');
  el.innerHTML=`<select onchange="selR(this.value)" style="min-width:190px;border:1px solid var(--brd);border-radius:6px;padding:6px 9px;font-size:.8rem;background:var(--wht)">
    <option value="">— Seleccionar residente —</option>
    ${S.residents.map(x=>`<option value="${x.id}"${x.id===S.rid?' selected':''}>${x.apellido}, ${x.nombre} · ${x.anio}</option>`).join('')}
  </select>
  ${S.rid?`<button class="btn bg2 bsm" onclick="genResidenteLink('${S.rid}')" title="Generar link para el residente">🔗 Link</button>`:''}
  <button class="btn bg2 bsm" onclick="oAddR()">＋ Residente</button>`;
}
function rTabs(){
  document.querySelectorAll('.tab').forEach(t=>{const tab=t.getAttribute('onclick').match(/'(\w+)'/)[1];t.className='tab'+(tab===S.tab?' act':'');});
}
function setTab(t){S.tab=t;rTabs();rContent();}
function selR(id){S.rid=id||null;render();}
function rContent(){
  const el=document.getElementById('content'),r=aR();
  if(!r&&S.tab!=='perfil'){el.innerHTML=`<div class="card"><div class="empty"><div class="ei">👤</div><p style="font-weight:700;margin-bottom:6px">Seleccioná un residente</p></div></div>`;return;}
  ({perfil:tPerfil,rotaciones:tRots,evals:tEvals,procs:tProcs,guardias:tGuards,portafolio:tPort,ateneos:tAteneos,ciencia:tCiencia,licencias:tLicencias,comunidad:tComunidad,reporte:tRep})[S.tab]?.(r);

function genResidenteLink(rid){
  const cfg=localStorage.getItem('fb_config');
  if(!cfg){alert('Firebase no conectado.');return;}
  const base=window.location.href.split('/').slice(0,-1).join('/')+'/residente.html';
  const link=`${base}?rid=${rid}#${btoa(cfg)}`;
  prompt('📋 Seleccioná todo (Ctrl+A) y copiá este link para enviárselo al residente:',link);
}

// ===== PERFIL =====

  const ev=S.evals.filter(e=>e.rid===r.id),pr=S.procs.filter(p=>p.rid===r.id),gu=S.guardias.filter(g=>g.rid===r.id),ca=S.casos.filter(x=>x.rid===r.id);
  const pnc={},ppc={};pr.forEach(p=>{if(PNEO.includes(p.tipo))pnc[p.tipo]=(pnc[p.tipo]||0)+1;if(PPED.includes(p.tipo))ppc[p.tipo]=(ppc[p.tipo]||0)+1;});

        <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:3px">${r.apellido}, ${r.nombre}</h2>

        <div style="opacity:.7;font-size:.74rem;margin-top:3px">${r.matricula?'Mat. '+r.matricula:''} ${r.dni?'DNI '+r.dni:''}</div>
      </div>

  <div class="g2" style="margin-bottom:14px">
    <div class="card" style="margin-bottom:0"><div class="ch"><div><div class="ct" style="color:var(--neo)">🟢 Procedimientos Neo</div><div class="cs">${doneN}/${PNEO.length}</div></div><span style="font-weight:800;color:var(--neo)">${Math.round(doneN/PNEO.length*100)}%</span></div><div class="pw"><div class="pb pb-neo" style="width:${Math.round(doneN/PNEO.length*100)}%"></div></div></div>
    <div class="card" style="margin-bottom:0"><div class="ch"><div><div class="ct" style="color:var(--pri)">🔵 Procedimientos Ped</div><div class="cs">${doneP}/${PPED.length}</div></div><span style="font-weight:800;color:var(--pri)">${Math.round(doneP/PPED.length*100)}%</span></div><div class="pw"><div class="pb pb-pri" style="width:${Math.round(doneP/PPED.length*100)}%"></div></div></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ct">Datos del Residente</div><button class="btn bg2 bsm" onclick="oEditR('${r.id}')">Editar</button></div>
    <div class="g2">${[['Matrícula',r.matricula],['DNI',r.dni],['Email',r.email],['Teléfono',r.tel],['Universidad',r.uni],['Tutor / Instructora',r.tutor]].map(([l,v])=>`<div><div style="font-size:.68rem;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:2px">${l}</div><div style="font-size:.85rem">${v||'—'}</div></div>`).join('')}</div>

// ===== ROTACIONES =====
function rotGlobalBadge(ro){
  const vs=Object.values(ro.comps||{}).filter(Boolean);
  if(!vs.length)return'<span class="badge" style="background:#e2e8f0;color:#718096">Sin calificar</span>';
  const p=Math.round(avg(vs));return`<span class="sc ${ROT_CSS[p]||'sm'}">${ROT_LBL[p]||'—'}</span>`;
}
function tRots(r){
  const el=document.getElementById('content');
  let rows=S.rots.filter(x=>x.rid===r.id);
  if(rotFilter!=='all')rows=rows.filter(x=>x.categoria===rotFilter);
  rows=rows.sort((a,b)=>b.fi.localeCompare(a.fi));
  const all=S.rots.filter(x=>x.rid===r.id);
  const cnt=cat=>all.filter(x=>x.categoria===cat).length;
  el.innerHTML=`<div class="card">
    <div class="ch"><div><div class="ct">Rotaciones</div><div class="cs">${all.length} total</div></div>
    <button class="btn bsm" style="background:var(--pri);color:#fff" onclick="oAddRot('${r.id}')">＋ Nueva rotación</button></div>
    <div class="subtabs">
      <button class="stab${rotFilter==='all'?' act':''}" onclick="rotFilter='all';tRots(aR())">Todas (${all.length})</button>
      <button class="stab stab-neo${rotFilter==='neo'?' act':''}" onclick="rotFilter='neo';tRots(aR())">🟢 Neo (${cnt('neo')})</button>
      <button class="stab${rotFilter==='ped'?' act':''}" onclick="rotFilter='ped';tRots(aR())">🔵 Ped (${cnt('ped')})</button>
      <button class="stab stab-otras${rotFilter==='otras'?' act':''}" onclick="rotFilter='otras';tRots(aR())">⚪ Otras (${cnt('otras')})</button>
    </div>
    ${!rows.length?`<div class="empty"><div class="ei">🔄</div><p>Sin rotaciones</p></div>`:`
    <div class="tw"><table>
      <thead><tr><th>Categoría</th><th>Rotación</th><th>Sede</th><th>Docente</th><th>Desde</th><th>Hasta</th><th>Desempeño</th><th>Estado</th><th></th></tr></thead>
      <tbody>${rows.map(ro=>`<tr>
        <td><span class="badge ${CAT_CSS[ro.categoria]||'cat-otras'}">${CAT_LBL[ro.categoria]||'—'}</span></td>
        <td><strong>${ro.serv==='Otras'?(ro.otraDesc||'Otras'):ro.serv}</strong></td>
        <td style="font-size:.75rem;color:var(--muted)">${ro.sede||'—'}</td>
        <td style="font-size:.75rem">${ro.docente||'—'}</td>
        <td>${fd(ro.fi)}</td><td>${ro.ff?fd(ro.ff):'<em style="color:var(--muted)">en curso</em>'}</td>
        <td>${rotGlobalBadge(ro)}</td>
        <td>${ro.apr===true?'<span class="badge" style="background:#c6f6d5;color:#276749">✓ Aprobada</span>':ro.apr===false?'<span class="badge" style="background:#fed7d7;color:#c53030">✗ No aprobada</span>':'<span class="badge" style="background:#e2e8f0;color:#718096">Pendiente</span>'}</td>
        <td><button class="btn bg2 bsm" onclick="oEditRot('${ro.id}')">✏️</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function oAddRot(rid){
  window._RUBS=window._RUBS||{};window._RUBS['nr']={};
  om('Registrar Rotación',`
    <div class="fg"><label>Categoría</label><select id="fcat" onchange="updRotInput(this.value)"><option value="neo">🟢 Neonatología</option><option value="ped">🔵 Pediatría</option><option value="otras">⚪ Otras</option></select></div>
    <div class="fr">
      <div class="fg" id="div-serv-std"><label id="lbl-serv">Rotación</label><input id="fserv" list="dl-neo" placeholder="Elegí o escribí"></div>
      <div class="fg" id="div-serv-otras" style="display:none"><label>Nombre de la rotación</label><input id="fotraDesc" placeholder="Describí la rotación"></div>
      <div class="fg"><label>Sede</label><input id="fsede" placeholder="Sanatorio 9 de Julio…"></div>
    </div>
    <div class="fr"><div class="fg"><label>Fecha inicio</label><input type="date" id="ffi" value="${hoy()}"></div><div class="fg"><label>Fecha fin</label><input type="date" id="fff"></div></div>
    <div class="fg"><label>Docente / Tutor a cargo</label><input id="fdocente" placeholder="Nombre del docente"></div>
    <div class="sd">Evaluación por Competencias</div>
    ${rubricaHTML('nr')}
    <div class="fg"><label>Estado</label><select id="fapr"><option value="">Pendiente</option><option value="true">Aprobada</option><option value="false">No aprobada</option></select></div>
    <div class="fg"><label>Logros / Fortalezas</label><textarea id="flogros"></textarea></div>
    <div class="fg"><label>Áreas a fortalecer</label><textarea id="fareas"></textarea></div>
    <div class="fg"><label>Observaciones</label><textarea id="fobs"></textarea></div>`,
    `<button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svRot('${rid}')">Guardar</button>`);
}
function updRotInput(cat){
  const stdDiv=document.getElementById('div-serv-std'),otraDiv=document.getElementById('div-serv-otras'),inp=document.getElementById('fserv'),lbl=document.getElementById('lbl-serv');
  if(cat==='otras'){stdDiv.style.display='none';otraDiv.style.display='';}
  else{stdDiv.style.display='';otraDiv.style.display='none';inp.setAttribute('list',cat==='neo'?'dl-neo':'dl-ped');lbl.textContent=cat==='neo'?'Rotación Neonatología':'Rotación Pediatría';}
}
function oEditRot(id){
  const ro=S.rots.find(r=>r.id===id);if(!ro)return;
  window._RUBS=window._RUBS||{};window._RUBS['er']={...ro.comps||{}};
  om('Editar Rotación',`<input type="hidden" id="froid" value="${id}">
    <div class="fg"><label>Categoría</label><select id="fcat" onchange="updRotInput(this.value)"><option value="neo"${ro.categoria==='neo'?' selected':''}>🟢 Neonatología</option><option value="ped"${ro.categoria==='ped'?' selected':''}>🔵 Pediatría</option><option value="otras"${ro.categoria==='otras'?' selected':''}>⚪ Otras</option></select></div>
    <div class="fr">
      <div class="fg" id="div-serv-std"${ro.categoria==='otras'?' style="display:none"':''}><label id="lbl-serv">Rotación</label><input id="fserv" list="dl-${ro.categoria==='ped'?'ped':'neo'}" value="${ro.serv}"></div>
      <div class="fg" id="div-serv-otras"${ro.categoria!=='otras'?' style="display:none"':''}><label>Nombre</label><input id="fotraDesc" value="${ro.otraDesc||''}"></div>
      <div class="fg"><label>Sede</label><input id="fsede" value="${ro.sede||''}"></div>
    </div>
    <div class="fr"><div class="fg"><label>Fecha inicio</label><input type="date" id="ffi" value="${ro.fi}"></div><div class="fg"><label>Fecha fin</label><input type="date" id="fff" value="${ro.ff||''}"></div></div>
    <div class="fg"><label>Docente</label><input id="fdocente" value="${ro.docente||''}"></div>
    <div class="sd">Evaluación por Competencias</div>${rubricaHTML('er',ro.comps||{})}
    <div class="fg"><label>Estado</label><select id="fapr"><option value=""${ro.apr==null?' selected':''}>Pendiente</option><option value="true"${ro.apr===true?' selected':''}>Aprobada</option><option value="false"${ro.apr===false?' selected':''}>No aprobada</option></select></div>
    <div class="fg"><label>Logros</label><textarea id="flogros">${ro.logros||''}</textarea></div>
    <div class="fg"><label>Áreas</label><textarea id="fareas">${ro.areas||''}</textarea></div>
    <div class="fg"><label>Observaciones</label><textarea id="fobs">${ro.obs||''}</textarea></div>`,
    `<button class="btn br bsm" onclick="del('rots','${id}');cm()">Eliminar</button><button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svRot('${ro.rid}','${id}')">Guardar</button>`);
}
function svRot(rid,id){
  const pre=id?'er':'nr',cat=document.getElementById('fcat').value,esOtras=cat==='otras';
  const servVal=esOtras?(document.getElementById('fotraDesc')?.value||'Otra rotación'):(document.getElementById('fserv')?.value||'');
  const d={rid,categoria:cat,serv:esOtras?'Otras':servVal,otraDesc:esOtras?servVal:'',
    sede:document.getElementById('fsede').value,docente:document.getElementById('fdocente').value,
    fi:document.getElementById('ffi').value,ff:document.getElementById('fff').value||null,
    comps:{...(window._RUBS?.[pre]||{})},
    apr:document.getElementById('fapr').value===''?null:document.getElementById('fapr').value==='true',
    logros:document.getElementById('flogros').value,areas:document.getElementById('fareas').value,obs:document.getElementById('fobs').value};
  if(id){const i=S.rots.findIndex(r=>r.id===id);if(i>=0)S.rots[i]={...S.rots[i],...d};}
  else S.rots.push({id:uid(),...d});
  if(window._RUBS)window._RUBS[pre]={};
  save();cm();tRots(aR());
}

  el.innerHTML=`<div class="card">
    <div class="ch"><div><div class="ct">Evaluaciones</div><div class="cs">${rows.length} total</div></div>

      <button class="btn bg2 bsm" onclick="oEval('${r.id}','simulacion')">🎯 Simulación</button>
      <button class="btn bp bsm" onclick="oEval('${r.id}','teorico')">📝 Teórico</button>
      <button class="btn bg2 bsm" onclick="oEval('${r.id}','paseSala')">🏥 Pase de sala</button>

        <td>${fd(e.fecha)}</td><td style="font-size:.75rem">${e.rot||'—'}</td>
        <td style="font-size:.75rem;font-weight:600">${e.docente||'—'}</td>

        <td>${e.res?`<span class="sc ${e.res==='Aprobado'?'sh':e.res==='No aprobado'?'sl':'sm'}">${e.res}</span>`:'—'}</td>
        <td style="font-size:.74rem;color:var(--muted);max-width:120px">${e.razon?e.razon.substring(0,55)+'…':'—'}</td>
        <td style="font-size:.74rem;color:var(--muted);max-width:120px">${e.plan?e.plan.substring(0,55)+'…':'—'}</td>
        <td style="white-space:nowrap"><button class="btn bg2 bsm" onclick="oEditEval('${e.id}')">✏️</button> <button class="btn bg2 bsm" style="color:var(--red)" onclick="del('evals','${e.id}')">🗑</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`}

function oEval(rid,tipo){
  let ex='';
  if(tipo==='minicex'){
    ex=`<div class="sd">Dominios Mini-CEX (1 inferior · 5 satisfactorio · 9 superior)</div>
    ${MCEX.map((d,i)=>`<div style="margin-bottom:10px"><div style="font-size:.78rem;font-weight:600;margin-bottom:5px">${d}</div><div style="display:flex;gap:3px">${[1,2,3,4,5,6,7,8,9].map(n=>`<button type="button" style="flex:1;padding:5px 2px;border:1px solid var(--brd);border-radius:4px;background:var(--bg);cursor:pointer;font-size:.75rem;font-weight:600;text-align:center" id="mc${i}_${n}" onclick="srat('mc${i}',${n},9)">${n}</button>`).join('')}</div></div>`).join('')}`;
  }
  om(`Nueva evaluación: ${TLBL[tipo]||tipo}`,`
    <div class="fr"><div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${hoy()}"></div>
    <div class="fg"><label>Docente evaluador/a</label><input id="fdocente" placeholder="Nombre del docente"></div></div>
    <div class="fg"><label>Rotación en curso</label><input id="frot" list="dl-neo"></div>

    <div class="fr"><div class="fg"><label>Puntaje global (0–10)</label><input type="number" id="fsc" min="0" max="10" step=".1"></div>

    <div class="sd">Marco Conceptual</div>
    <div class="csec"><div class="csec-title">Razonamiento clínico observado</div><textarea id="frazon"></textarea></div>
    <div class="csec"><div class="csec-title">Integración de evidencia (SAP, PRONEO, SIBEN, SEUP)</div><textarea id="fevid"></textarea></div>
    <div class="csec"><div class="csec-title">Fortalezas identificadas</div><textarea id="ffort"></textarea></div>
    <div class="csec"><div class="csec-title">Áreas de mejora</div><textarea id="fmej"></textarea></div>
    <div class="csec"><div class="csec-title">Autoevaluación del residente</div><textarea id="fauto"></textarea></div>
    <div class="csec"><div class="csec-title">Plan de acción acordado</div><textarea id="fplan"></textarea></div>`,
    `<button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEval('${rid}','${tipo}')">Guardar</button>`);

window._RAT={};
function srat(pre,val,mx){
  for(let i=1;i<=mx;i++){const b=document.getElementById(`${pre}_${i}`);if(b){b.style.background='var(--bg)';b.style.color='var(--txt)';b.style.borderColor='var(--brd)';}}
  const b=document.getElementById(`${pre}_${val}`);if(b){b.style.background='var(--pri)';b.style.color='#fff';b.style.borderColor='var(--pri)';}
  window._RAT[pre]=val;
}
function svEval(rid,tipo){
  const sc=document.getElementById('fsc').value;
  S.evals.push({id:uid(),rid,tipo,fecha:document.getElementById('ff2').value||hoy(),
    docente:document.getElementById('fdocente')?.value||'',rot:document.getElementById('frot')?.value||'',
    score:sc!==''?parseFloat(sc):null,res:document.getElementById('fres')?.value||'',
    razon:document.getElementById('frazon')?.value||'',evid:document.getElementById('fevid')?.value||'',
    fort:document.getElementById('ffort')?.value||'',mej:document.getElementById('fmej')?.value||'',
    auto:document.getElementById('fauto')?.value||'',plan:document.getElementById('fplan')?.value||'',
    dominios:{...window._RAT}});
  window._RAT={};save();cm();render();
}

  const e=S.evals.find(x=>x.id===id);if(!e)return;
  om(`Editar: ${TLBL[e.tipo]||e.tipo}`,`
    <div class="fr"><div class="fg"><label>Fecha</label><input type="date" id="ff2" value="${e.fecha}"></div>

    <div class="fg"><label>Rotación</label><input id="frot" list="dl-neo" value="${e.rot||''}"></div>
    <div class="fr"><div class="fg"><label>Puntaje (0–10)</label><input type="number" id="fsc" min="0" max="10" step=".1" value="${e.score??''}"></div>
    <div class="fg"><label>Resultado</label><select id="fres"><option value="">—</option><option${e.res==='Aprobado'?' selected':''}>Aprobado</option><option${e.res==='No aprobado'?' selected':''}>No aprobado</option><option${e.res==='Necesita refuerzo'?' selected':''}>Necesita refuerzo</option></select></div></div>
    <div class="sd">Marco Conceptual</div>
    <div class="csec"><div class="csec-title">Razonamiento clínico</div><textarea id="frazon">${e.razon||''}</textarea></div>
    <div class="csec"><div class="csec-title">Integración de evidencia</div><textarea id="fevid">${e.evid||''}</textarea></div>
    <div class="csec"><div class="csec-title">Fortalezas</div><textarea id="ffort">${e.fort||''}</textarea></div>
    <div class="csec"><div class="csec-title">Áreas de mejora</div><textarea id="fmej">${e.mej||''}</textarea></div>
    <div class="csec"><div class="csec-title">Autoevaluación del residente</div><textarea id="fauto">${e.auto||''}</textarea></div>

    `<button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svEditEval('${id}')">Guardar cambios</button>`);

function svEditEval(id){

// ===== GUARDIAS (CALENDARIO) =====
function tGuards(r){
  const el=document.getElementById('content');
  const gu=S.guardias.filter(g=>g.rid===r.id);
  const now=new Date();
  if(!window._gcal)window._gcal={y:now.getFullYear(),m:now.getMonth()};
  const {y,m}=window._gcal;
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const monthLabel=new Date(y,m,1).toLocaleString('es-AR',{month:'long',year:'numeric'});
  const mesStr=`${y}-${String(m+1).padStart(2,'0')}`;
  const guardDays={};
  gu.forEach(g=>{if(g.fecha&&g.fecha.startsWith(mesStr)){const d=parseInt(g.fecha.split('-')[2]);if(!guardDays[d])guardDays[d]=[];guardDays[d].push(g);}});
  const gm=Object.values(guardDays).reduce((s,a)=>s+a.length,0),maxM=parseInt(r.anio)>=5?5:6;
  const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cal=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${DN.map(d=>`<div style="text-align:center;font-size:.64rem;font-weight:700;color:var(--muted);padding:4px 0">${d}</div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;
  for(let i=0;i<firstDay;i++)cal+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,m,d),isFds=date.getDay()===0||date.getDay()===6;
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const gs=guardDays[d]||[],hasG=gs.length>0,isToday=dateStr===hoy();
    const bg=hasG?(isFds?'#fefcbf':'var(--pri-bg)'):'var(--bg)',col=hasG?(isFds?'#744210':'var(--pri)'):'var(--txt)';
    const brd=isToday?`2px solid var(--pri)`:`1px solid ${hasG?(isFds?'#d69e2e':'var(--pri-acc)'):'var(--brd)'}`;
    cal+=`<div onclick="oGuardiaDay('${r.id}','${dateStr}',${isFds})" style="background:${bg};border:${brd};border-radius:6px;padding:5px 2px;text-align:center;cursor:pointer;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">
      <span style="font-size:.8rem;font-weight:${isToday?800:400};color:${col}">${d}</span>
      ${hasG?`<span style="font-size:.58rem;background:${isFds?'#d69e2e':'var(--pri)'};color:#fff;border-radius:10px;padding:1px 5px;font-weight:700">${gs.length>1?gs.length+'×':'✓'}</span>`:isFds?`<span style="font-size:.56rem;color:var(--muted);opacity:.45">FS</span>`:''}
    </div>`;
  }
  cal+=`</div>`;
  el.innerHTML=`<div class="card">
    <div class="ch"><div><div class="ct">Guardias</div><div class="cs">${gm} este mes · Máx: ${maxM}/mes${gm>maxM?' ⚠️':''}</div></div>
    <button class="btn bg2 bsm" onclick="oGuardia('${r.id}')">＋ Manual</button></div>
    <div class="g3" style="margin-bottom:14px">
      <div class="stat"><div class="n">${gm}</div><div class="l">Este mes</div></div>
      <div class="stat"><div class="n">${gu.filter(g=>g.tipo==='fds').length}</div><div class="l">Fin de semana</div></div>
      <div class="stat"><div class="n">${gu.length}</div><div class="l">Total</div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="btn bg2" onclick="window._gcal.m--;if(window._gcal.m<0){window._gcal.m=11;window._gcal.y--;}tGuards(aR())">◀ Anterior</button>
      <span style="font-weight:700;font-size:.9rem;text-transform:capitalize">${monthLabel}</span>
      <button class="btn bg2" onclick="window._gcal.m++;if(window._gcal.m>11){window._gcal.m=0;window._gcal.y++;}tGuards(aR())">Siguiente ▶</button>
    </div>
    <div style="font-size:.7rem;color:var(--muted);margin-bottom:10px">Tocá un día para registrar ·
      <span style="background:var(--pri-bg);color:var(--pri);padding:1px 7px;border-radius:10px;font-weight:700">Semana</span>
      <span style="background:#fefcbf;color:#744210;padding:1px 7px;border-radius:10px;font-weight:700;margin-left:4px">Fin de semana</span>
    </div>
    ${cal}
  </div>`;
}

function om(title,body,footer){
  document.getElementById('mc').innerHTML=`<div class="mh"><div class="mt">${title}</div><button class="mx" onclick="cm()">✕</button></div>${body}<div class="mf">${footer}</div>`;
  document.getElementById('mo').classList.add('open');
}
function cm(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))cm();});

  om('Agregar Residente',`
    <div class="fr"><div class="fg"><label>Nombre</label><input id="fn" placeholder="María"></div><div class="fg"><label>Apellido</label><input id="fa" placeholder="González"></div></div>

    <div class="fg"><label>Observaciones</label><textarea id="fo"></textarea></div>`,
    `<button class="btn bg2" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svR()">Guardar</button>`);

function oEditR(id){
  const r=gR(id);if(!r)return;
  om('Editar Residente',`<input type="hidden" id="fid" value="${id}">
    <div class="fr"><div class="fg"><label>Nombre</label><input id="fn" value="${r.nombre}"></div><div class="fg"><label>Apellido</label><input id="fa" value="${r.apellido}"></div></div>

    <div class="fr"><div class="fg"><label>Fecha ingreso</label><input type="date" id="fi2" value="${r.fechaIng}"></div><div class="fg"><label>DNI</label><input id="fd" value="${r.dni||''}"></div></div>
    <div class="fr"><div class="fg"><label>Email</label><input id="fem" value="${r.email||''}"></div><div class="fg"><label>Teléfono</label><input id="ft" value="${r.tel||''}"></div></div>

function svR(id){
  const n=document.getElementById('fn')?.value?.trim(),a=document.getElementById('fa')?.value?.trim();
  if(!n||!a){alert('Nombre y apellido requeridos.');return;}
  const d={nombre:n,apellido:a,anio:ANOS[parseInt(document.getElementById('fano').value)-1],matricula:document.getElementById('fmat')?.value||'',fechaIng:document.getElementById('fi2').value||hoy(),dni:document.getElementById('fd')?.value||'',email:document.getElementById('fem')?.value||'',tel:document.getElementById('ft')?.value||'',uni:document.getElementById('fu')?.value||'',tutor:document.getElementById('ftu')?.value||'',obs:document.getElementById('fo')?.value||''};
  if(id){const i=S.residents.findIndex(r=>r.id===id);if(i>=0)S.residents[i]={...S.residents[i],...d};}
  else{const r={id:uid(),...d};S.residents.push(r);S.rid=r.id;}
  save();cm();render();
}
function delR(id){
  if(!confirm('¿Eliminar residente y todos sus datos?'))return;
  COLLS.forEach(k=>{S[k]=k==='residents'?S[k].filter(r=>r.id!==id):S[k].filter(x=>x.rid!==id);});
  if(S.rid===id)S.rid=S.residents[0]?.id||null;
  save();cm();render();
}

// ===== RUBRICA =====
function rubricaHTML(prefijo,vals={}){
  return`<div>${RCOMP.map((d,i)=>`<div class="rubric-row"><span class="rlab">${d}</span><div class="rbts">${RNIVS.map((n,j)=>{const v=j+1;return`<button type="button" class="rbt${vals[i+1]===v?' sel-'+v:''}" id="rb_${prefijo}_${i+1}_${v}" onclick="srub('${prefijo}',${i+1},${v})">${n}</button>`;}).join('')}</div></div>`).join('')}</div>`;
}
window._RUBS={};
function srub(pre,dom,val){
  if(!window._RUBS[pre])window._RUBS[pre]={};window._RUBS[pre][dom]=val;
  RNIVS.forEach((_,j)=>{const b=document.getElementById(`rb_${pre}_${dom}_${j+1}`);if(b)b.className='rbt';});
  const b=document.getElementById(`rb_${pre}_${dom}_${val}`);if(b)b.classList.add(`sel-${val}`);
}

function del(col,id){if(!confirm('¿Eliminar?'))return;S[col]=S[col].filter(x=>x.id!==id);save();render();}
